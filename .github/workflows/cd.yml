name: CD

on:
  workflow_run:
    workflows: ["CI"]   # Name deines CI-Workflows
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Nur ausführen wenn CI erfolgreich war UND auf staging Branch
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'staging'

    steps:

      - name: SSH Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Known Hosts hinzufügen
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deployment auf Staging-Server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            docker pull ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging &&
            docker stop webshop || true &&
            docker rm webshop || true &&
            docker run -d -p 3000:3000 --name webshop ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging
          "