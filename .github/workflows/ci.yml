name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test With Bun
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t webshop-app .

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Image taggen
        run: docker tag webshop-app ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging

      - name: Image pushen
        run: docker push ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging