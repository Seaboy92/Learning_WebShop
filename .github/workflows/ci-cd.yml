name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["staging"]

jobs:

  ci:
    name: Build & Test & Docker Push
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run integration-/ unit-/ api-tests
        run: bun run test

      - name: Docker Build
        run: docker build -t webshop-app .

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Docker Tag & Push
        run: |
          docker tag webshop-app ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging
          docker push ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging

  cd:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: SSH vorbereiten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      
      - name: Repository auschecken
        uses: actions/checkout@v4
        
      - name: Deploy-Skript kopieren
        run: scp -P ${{ secrets.SSH_PORT }} .github/workflows/scripts/deploy.ps1 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:C:/deploy/deploy.ps1

      - name: Deploy auf Server
        run: ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File C:\deploy\deploy.ps1
          -DockerUser ${{ secrets.DOCKER_USERNAME }}
          -DockerToken ${{ secrets.DOCKER_TOKEN }}
          -Image ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging
          -Port 3000:3000
          -Container webshop-app-test"

      - name: Cleanup Deploy-Skript
        if: always()
        run: ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command \"if (Test-Path 'C:\deploy\deploy.ps1') { Remove-Item 'C:\deploy\deploy.ps1' -Force }\""
