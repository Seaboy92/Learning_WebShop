name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["staging"]

jobs:

  ci:
    name: Build & Test & Docker Push
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Docker Build
        run: docker build -t webshop-app .

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Docker Tag & Push
        run: |
          docker tag webshop-app ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging
          docker push ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging


  cd:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci 

    steps:
      - name: Deploy auf Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOCKER_USERNAME,DOCKER_TOKEN
          script: |
            powershell -Command "
              echo \$env:DOCKER_TOKEN | docker login -u \$env:DOCKER_USERNAME --password-stdin
              docker pull \$env:DOCKER_USERNAME/learning_webshop-app:staging
              docker stop webshop-app 2>\$null
              docker rm webshop-app 2>\$null
              docker run -d --name webshop-app -p 3000:3000 \$env:DOCKER_USERNAME/learning_webshop-app:staging
            "