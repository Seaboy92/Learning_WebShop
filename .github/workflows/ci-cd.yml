name: CI/CD Pipeline

on:
  push:
    branches: ["staging"]

jobs:

  ci:
    name: Build & Test & Docker Push
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Docker Build
        run: docker build -t webshop-app .

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Docker Tag & Push
        run: |
          docker tag webshop-app ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging
          docker push ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging


  cd:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci 

    steps:

      - name: SSH Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Known Hosts hinzufügen
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy auf Server
        uses: appleboy/ssh-action@master
        with: 
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            script:
                C:\Users\Admin\.docker\pull_and_start.ps1