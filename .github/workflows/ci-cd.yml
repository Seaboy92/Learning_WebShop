name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["staging"]

jobs:

  ci:
    name: Build & Test & Docker Push
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Docker Build
        run: docker build -t webshop-app .

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Docker Tag & Push
        run: |
          docker tag webshop-app ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging
          docker push ${{ secrets.DOCKER_USERNAME }}/learning_webshop-app:staging


  cd:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: SSH vorbereiten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy auf Server
        run: |
          REMOTE_PS=$(cat <<'EOF'
          $ErrorActionPreference = 'Stop'
          $dockerUser = '${{ secrets.DOCKER_USERNAME }}'
          $dockerToken = '${{ secrets.DOCKER_TOKEN }}'
          $image = "$dockerUser/learning_webshop-app:staging"
          $container = 'webshop-app'
          $dockerConfig = Join-Path $env:TEMP 'docker-gha-auth'
          $configFile = Join-Path $dockerConfig 'config.json'
          $authBytes = [System.Text.Encoding]::UTF8.GetBytes("${dockerUser}:${dockerToken}")
          $authValue = [System.Convert]::ToBase64String($authBytes)

          if (Test-Path $dockerConfig) {
            Remove-Item -Recurse -Force $dockerConfig
          }
          New-Item -ItemType Directory -Path $dockerConfig | Out-Null
          $env:DOCKER_CONFIG = $dockerConfig

          Set-Content -Path $configFile -Value "{`"auths`":{`"https://index.docker.io/v1/`":{`"auth`":`"$authValue`"}}}" -Encoding ascii

          docker pull $image
          if ($LASTEXITCODE -ne 0) { throw 'docker pull fehlgeschlagen' }

          $exists = docker ps -a --format '{{.Names}}' | Select-String -Pattern "^$container$" -Quiet
          if ($exists) {
            docker rm -f $container
            if ($LASTEXITCODE -ne 0) { throw 'docker rm fehlgeschlagen' }
          }

          docker run -d --restart unless-stopped --name $container -p 3000:3000 $image
          if ($LASTEXITCODE -ne 0) { throw 'docker run fehlgeschlagen' }

          docker ps -a
          docker logs $container

          Remove-Item -Recurse -Force $dockerConfig
          EOF
          )

          ENCODED_PS=$(printf '%s' "$REMOTE_PS" | iconv -t UTF-16LE | base64 -w 0)
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -EncodedCommand $ENCODED_PS"
